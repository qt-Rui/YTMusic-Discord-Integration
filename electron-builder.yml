appId: com.ytmusicrpc.app
productName: YTMusic Discord RPC
copyright: Copyright © 2026 YTMusic RPC Contributors

directories:
  output: release
  buildResources: resources

# Only ship the compiled output + the unbundled runtime deps.
files:
  - out/**/*
  - package.json
  - "!**/*.map"

# The browser extension is shipped alongside the app so users can load it.
extraResources:
  - from: extension
    to: extension
    filter:
      - "**/*"

# ---------- Windows ----------
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  # Stable, version-less filename so the website can link directly to
  # /releases/latest/download/<name> and never needs updating per release.
  artifactName: YTMusic-Discord-RPC-Setup.${ext}

# ---------- macOS ----------
mac:
  category: public.app-category.music
  target:
    # One universal binary runs on both Intel and Apple Silicon, so the site
    # only needs a single macOS download button.
    - target: dmg
      arch: [universal]
  icon: resources/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
dmg:
  artifactName: YTMusic-Discord-RPC.${ext}

# ---------- Linux ----------
linux:
  target:
    - AppImage
    - deb
  category: AudioVideo
  icon: resources/icon.png
  maintainer: YTMusic RPC Contributors
  # AppImage + deb share this template; the extension keeps them distinct.
  artifactName: YTMusic-Discord-RPC.${ext}

# We do not auto-publish anywhere — everything stays local.
publish: null
